<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --cream: #fdf8f0;
  --warm: #fef3e2;
  --peach: #fde8d0;
  --brown: #8b5e3c;
  --brown-light: #c4916a;
  --brown-dark: #5c3d20;
  --green: #5a9a6f;
  --green-light: #e8f5ec;
  --green-dark: #3d7a52;
  --blue: #5b8fd4;
  --blue-light: #e8f0fb;
  --text: #3d2c1e;
  --text-light: #9c7b60;
  --text-muted: #c4a882;
  --border: #edddc8;
  --shadow: rgba(139,94,60,0.12);
  --me-bg: #e8f5ec;
  --me-border: #b8dfc6;

}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'Nunito Sans', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(253,232,208,0.8) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(232,245,236,0.6) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

/* ── SCREENS ── */
.screen {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:100; padding:1.5rem;
  background: var(--cream);
}
.screen.hidden { display:none; }

/* ── CARD ── */
.card {
  background:white;
  border-radius:28px;
  padding:2.25rem 2rem;
  max-width:420px; width:100%;
  box-shadow: 0 8px 40px var(--shadow), 0 2px 8px rgba(0,0,0,0.04);
  animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.9) translateY(16px); }
  to   { opacity:1; transform:none; }
}

.card-header { text-align:center; margin-bottom:1.75rem; }
.card-emoji  { font-size:2.8rem; display:block; margin-bottom:0.6rem; animation:wave 2.5s ease-in-out infinite; }
@keyframes wave { 0%,100%{transform:rotate(0)} 25%{transform:rotate(8deg)} 75%{transform:rotate(-8deg)} }
.card-title  { font-family:'Nunito',sans-serif; font-size:1.55rem; font-weight:900; color:var(--brown-dark); }
.card-sub    { font-size:0.88rem; color:var(--text-light); margin-top:0.35rem; }

/* Tabs */
.tabs {
  display:flex; gap:0.4rem;
  background:var(--warm); border-radius:14px; padding:4px;
  margin-bottom:1.5rem;
}
.tab-btn {
  flex:1; padding:0.55rem; border:none; background:transparent;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem;
  color:var(--text-light); cursor:pointer; border-radius:10px;
  transition:all 0.2s;
}
.tab-btn.active { background:white; color:var(--brown-dark); box-shadow:0 2px 8px var(--shadow); }

/* Fields */
.field { margin-bottom:1rem; }
.field label {
  display:block; font-family:'Nunito',sans-serif; font-weight:700;
  font-size:0.78rem; color:var(--brown); margin-bottom:0.4rem; letter-spacing:0.02em;
}
.field input {
  width:100%; background:var(--warm); border:2px solid var(--border);
  color:var(--text); padding:0.7rem 1rem; font-family:'Nunito Sans',sans-serif;
  font-size:0.95rem; outline:none; border-radius:var(--rsm);
  transition:border-color 0.2s, background 0.2s;
}
.field input:focus { border-color:var(--brown-light); background:white; }
.field input::placeholder { color:var(--text-muted); }

/* Avatar picker */

}
.av-btn {

}
.av-btn:hover { transform:scale(1.1); border-color:var(--brown-light); }

.err {
  font-size:0.8rem; color:#e05a5a; padding:0.45rem 0.75rem;

}

.primary-btn {
  width:100%; background:linear-gradient(135deg,var(--brown) 0%,var(--brown-light) 100%);

}

.primary-btn:active { transform:scale(0.99); }

/* ── CHAT SCREEN ── */
#chat-screen { display:none; flex-direction:column; height:100dvh; position:relative; z-index:1; }

header {

  background:white; border-bottom:2px solid var(--border);

}
.h-left  { display:flex; align-items:center; gap:0.7rem; }

.h-status {

.h-right { display:flex; align-items:center; gap:0.5rem; }

/* Members bar */

.empty-emoji { font-size:2.8rem; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.empty-title { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.05rem; color:var(--brown-dark); }
.empty-sub   { font-size:0.83rem; color:var(--text-light); }

.date-sep {
  display:flex; align-items:center; gap:0.6rem; margin:0.5rem 0;
}
.date-sep span {
  font-family:'Nunito',sans-serif; font-weight:700; font-size:0.7rem;

}
.date-sep::before,.date-sep::after { content:''; flex:1; height:1px; background:var(--border); }

.msg-wrapper {
  display:flex; flex-direction:column;
  animation:slideIn 0.28s cubic-bezier(0.34,1.4,0.64,1) both;

}
@keyframes slideIn {
  from { opacity:0; transform:translateY(8px) scale(0.97); }

}
.msg-wrapper.me   { align-self:flex-end; align-items:flex-end; }
.msg-wrapper.them { align-self:flex-start; align-items:flex-start; }

.msg-meta {

}
.msg-av   { font-size:0.95rem; }
.msg-name { font-family:'Nunito',sans-serif; font-weight:700; font-size:0.76rem; color:var(--brown); }

.msg-bubble {
  padding:0.65rem 0.95rem; border-radius:var(--r);
  line-height:1.55; font-size:0.93rem; word-break:break-word;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.msg-wrapper.me   .msg-bubble { background:var(--me-bg);   border:2px solid var(--me-border);   border-bottom-right-radius:5px; color:var(--green-dark); }

.msg-time {
  font-size:0.66rem; color:var(--text-muted); margin-top:0.18rem;
  padding:0 0.45rem; font-family:'Nunito',sans-serif; font-weight:600;
}

/* Toast */
.toast {
  position:fixed; bottom:5rem; left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--brown-dark); color:white; padding:0.55rem 1.1rem;
  border-radius:20px; font-family:'Nunito',sans-serif; font-weight:700;
  font-size:0.8rem; opacity:0; transition:all 0.28s; z-index:50;
  white-space:nowrap; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* Input */
.input-area {
  padding:0.8rem 1rem 0.95rem;
  background:white; border-top:2px solid var(--border);
  display:flex; gap:0.55rem; align-items:flex-end; flex-shrink:0;
}
#msg-input {
  flex:1; background:var(--warm); border:2px solid var(--border);
  color:var(--text); padding:0.65rem 0.95rem;
  font-family:'Nunito Sans',sans-serif; font-size:0.93rem;
  outline:none; resize:none; border-radius:var(--r);
  transition:border-color 0.2s, background 0.2s;
  max-height:100px; line-height:1.5;
}
#msg-input:focus { border-color:var(--brown-light); background:white; }
#msg-input::placeholder { color:var(--text-muted); }

#send-btn {
  background:linear-gradient(135deg,var(--green-dark),var(--green));
  color:white; border:none; width:42px; height:42px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border-radius:50%; flex-shrink:0;
  box-shadow:0 4px 12px rgba(90,154,111,0.35);
  transition:transform 0.15s, opacity 0.15s;
}
#send-btn:hover  { transform:scale(1.08); }
#send-btn:active { transform:scale(0.94); }

@media (max-width:480px) {
  .card { padding:2rem 1.4rem; border-radius:22px; }

</style>

<body>

<!-- ── SCREEN 1 : ACCUEIL / TABS ── -->
<div class="screen" id="screen-welcome">
  <div class="card">
    <div class="card-header">
      <span class="card-emoji">🏠</span>
      <h1 class="card-title">Notre Chat Familial</h1>
      <p class="card-sub">La famille toujours connectée ✨</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('login')">Se connecter</button>
      <button class="tab-btn" onclick="showTab('register')">S'inscrire</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="field">
        <label>Ton prénom</label>
        <input type="text" id="login-name" placeholder="ex : Marie" maxlength="20" autocomplete="off">
      </div>
      <div class="field">
        <label>Clé secrète familiale</label>
        <input type="password" id="login-key" placeholder="Mot de passe de la famille" autocomplete="off">
      </div>
      <div id="err-login" class="err"></div>
      <button class="primary-btn" onclick="doLogin()">Rejoindre le chat 🚀</button>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div class="field">
        <label>Ton prénom</label>
        <input type="text" id="reg-name" placeholder="ex : Papa" maxlength="20" autocomplete="off">
      </div>
      <div class="field">
        <label>Ton email (pour recevoir les résumés)</label>
        <input type="email" id="reg-email" placeholder="ton@email.com" autocomplete="off">
      </div>
      <div class="field">
        <label>Ton avatar</label>
        <div class="avatar-grid" id="av-grid">
          <button class="av-btn sel" data-e="😊" onclick="pickAv(this)">😊</button>
          <button class="av-btn" data-e="🌸" onclick="pickAv(this)">🌸</button>
          <button class="av-btn" data-e="⭐" onclick="pickAv(this)">⭐</button>
          <button class="av-btn" data-e="🦋" onclick="pickAv(this)">🦋</button>
          <button class="av-btn" data-e="🌈" onclick="pickAv(this)">🌈</button>
          <button class="av-btn" data-e="🐻" onclick="pickAv(this)">🐻</button>
          <button class="av-btn" data-e="🌺" onclick="pickAv(this)">🌺</button>
          <button class="av-btn" data-e="🎈" onclick="pickAv(this)">🎈</button>
          <button class="av-btn" data-e="🍀" onclick="pickAv(this)">🍀</button>
          <button class="av-btn" data-e="🦊" onclick="pickAv(this)">🦊</button>
        </div>
      </div>
      <div class="field">
        <label>Clé secrète familiale</label>
        <input type="password" id="reg-key" placeholder="Demande-la à un membre de la famille" autocomplete="off">
      </div>
      <div id="err-reg" class="err"></div>
      <button class="primary-btn" onclick="doRegister()">Créer mon compte 🎉</button>
    </div>

    <div class="secure-note">
      <span>🔒</span>
      <span>Messages chiffrés de bout en bout. Seule ta famille peut les lire.</span>
    </div>
  </div>
</div>

<!-- ── CHAT ── -->
<div id="chat-screen">
  <header>
    <div class="h-left">
      <div class="h-icon">🏠</div>
      <div>
        <div class="h-title">Notre Chat Familial</div>
        <div class="h-status">En ligne · chiffré</div>
      </div>
    </div>
    <div class="h-right">
      <div class="user-chip">
        <span id="h-av"></span>
        <span id="h-name"></span>
      </div>
      <button class="btn-out" onclick="logout()">Quitter</button>
    </div>
  </header>

  <div id="members-bar"></div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-emoji">💌</div>
      <div class="empty-title">Pas encore de messages</div>
      <div class="empty-sub">Envoie le premier message à ta famille !</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="msg-input" placeholder="Écris un message…" rows="1" maxlength="2000"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ────────────────────────────────────────────────
  let userName  = '';
  let userAv    = '😊';
  let secretKey = '';
  let lastDate  = '';
  let allMembers = {}; // { name: { email, avatar } }

  // ── TABS ────────────────────────────────────────────────
  function showTab(t) {
    document.getElementById('tab-login').style.display    = t==='login'    ? '' : 'none';
    document.getElementById('tab-register').style.display = t==='register' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
  }

  function pickAv(btn) {
    document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    userAv = btn.dataset.e;
  }

  // ── TEXTAREA ────────────────────────────────────────────
  const msgInput = document.getElementById('msg-input');
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── CRYPTO ──────────────────────────────────────────────
  const encrypt = (t,k) => CryptoJS.AES.encrypt(t,k).toString();
  function decrypt(c,k) {
    try { const b = CryptoJS.AES.decrypt(c,k); return b.toString(CryptoJS.enc.Utf8)||null; }
    catch { return null; }
  }

  // ── TOAST ───────────────────────────────────────────────
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }

  // ── REGISTER ────────────────────────────────────────────
  async function doRegister() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const key   = document.getElementById('reg-key').value.trim();

    if (!name)              return showErr('err-reg','👋 Entre ton prénom !');
    if (!email.includes('@')) return showErr('err-reg','📧 Entre un email valide');
    if (key.length < 4)     return showErr('err-reg','🔑 Clé trop courte (min 4 caract.)');

    document.getElementById('err-reg').style.display = 'none';

    // Sauvegarde dans Firebase
    await membersRef.child(name).set({ email, avatar: userAv, joinedAt: Date.now() });

    userName  = name;
    secretKey = key;
    enterChat();
  }

  // ── LOGIN ────────────────────────────────────────────────
  async function doLogin() {
    const name = document.getElementById('login-name').value.trim();
    const key  = document.getElementById('login-key').value.trim();

    if (!name)          return showErr('err-login','👋 Entre ton prénom !');
    if (key.length < 4) return showErr('err-login','🔑 Clé trop courte');

    // Vérifie si le membre existe
    const snap = await membersRef.child(name).once('value');
    if (!snap.exists()) return showErr('err-login','❌ Prénom non trouvé — inscris-toi d\'abord !');

    document.getElementById('err-login').style.display = 'none';

    const data = snap.val();
    userAv    = data.avatar || '😊';
    userName  = name;
    secretKey = key;
    enterChat();
  }

  // ── ENTER CHAT ──────────────────────────────────────────
  function enterChat() {
    document.getElementById('screen-welcome').classList.add('hidden');
    document.getElementById('h-av').textContent   = userAv;
    document.getElementById('h-name').textContent = userName;
    document.getElementById('chat-screen').classList.add('active');
    loadMembers();
    listenMessages();
  }

  // ── MEMBERS BAR ─────────────────────────────────────────
  function loadMembers() {
    membersRef.on('value', snap => {
      allMembers = {};
      const bar  = document.getElementById('members-bar');
      bar.innerHTML = '<span style="font-size:0.7rem;color:var(--text-muted);font-family:Nunito,sans-serif;font-weight:700;flex-shrink:0;">Famille :</span>';
      snap.forEach(child => {
        const d = child.val();
        allMembers[child.key] = d;
        const pill = document.createElement('div');
        pill.className = 'member-pill';
        pill.innerHTML = `<span>${d.avatar||'😊'}</span><span>${child.key}</span>`;
        bar.appendChild(pill);
      });
    });
  }

  // ── MESSAGES ────────────────────────────────────────────
  function dateLabel(ts) {
    const d=new Date(ts), t=new Date(), y=new Date(t); y.setDate(t.getDate()-1);
    if(d.toDateString()===t.toDateString()) return "Aujourd'hui";
    if(d.toDateString()===y.toDateString()) return 'Hier';
    return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  }

  function listenMessages() {
    messagesRef.orderByChild('ts').limitToLast(80).once('value', snap => {
      const arr = [];
      snap.forEach(c => {
        const d=c.val(), t=decrypt(d.text,secretKey);
        if(t) arr.push({sender:d.sender,av:d.avatar||'😊',text:t,ts:d.clientTs||0,isMe:d.sender===userName});
      });
      arr.forEach(renderMsg);
    });

    const since = Date.now();
    messagesRef.orderByChild('ts').startAt(since).on('child_added', snap => {
      const d=snap.val(), t=decrypt(d.text,secretKey);
      if(!t) return;
      const isMe = d.sender===userName;
      renderMsg({sender:d.sender,av:d.avatar||'😊',text:t,ts:d.clientTs||since,isMe});
      if(!isMe) toast(`${d.avatar||'😊'} ${d.sender} a écrit un message`);
    });
  }

  function renderMsg({sender,av,text,ts,isMe}) {
    const es = document.getElementById('empty-state');
    if(es) es.remove();
    const c   = document.getElementById('messages');
    const dl  = dateLabel(ts);
    if(dl !== lastDate) {
      lastDate = dl;
      const sep = document.createElement('div');
      sep.className='date-sep';
      sep.innerHTML=`<span>${dl}</span>`;
      c.appendChild(sep);
    }
    const w  = document.createElement('div'); w.className='msg-wrapper '+(isMe?'me':'them');
    const mt = document.createElement('div'); mt.className='msg-meta';
    mt.innerHTML=`<span class="msg-av">${av}</span><span class="msg-name">${sender}</span>`;
    const b  = document.createElement('div'); b.className='msg-bubble'; b.textContent=text;
    const ti = document.createElement('div'); ti.className='msg-time';
    ti.textContent=new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    w.appendChild(mt); w.appendChild(b); w.appendChild(ti);
    c.appendChild(w); c.scrollTop=c.scrollHeight;
  }

  // ── SEND ────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if(!text) return;
    input.value=''; input.style.height='auto';

    const clientTs = Date.now();

    messagesRef.push({
      sender: userName,
      avatar: userAv,
      text:   encrypt(text, secretKey),
      clientTs,
      ts:     firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
      scheduleDigest(userName, userAv, text, clientTs);
    }).catch(() => toast('❌ Erreur — vérifie les règles Firebase'));
  }

  // ── DIGEST HORAIRE ───────────────────────────────────────
  // Logique : on accumule les messages dans Firebase sous /digest/pending
  // et on envoie un résumé groupé 1h après le premier message non envoyé.
  // Comme EmailJS tourne côté client, le premier membre actif qui détecte
  // que le délai est écoulé envoie le digest et nettoie la queue.

  function scheduleDigest(sender, av, text, ts) {
    if (EMAILJS_SERVICE_ID.includes('REMPLACE')) return;

    // Ajoute le message à la queue de digest
    digestRef.child('pending').push({ sender, av, text, ts });

    // Vérifie s'il y a déjà un timer en cours
    digestRef.child('nextSend').once('value', snap => {
      if (!snap.exists()) {
        // Première entrée — programme l'envoi dans 1h
        const sendAt = Date.now() + 60 * 60 * 1000; // 1 heure
        digestRef.child('nextSend').set(sendAt);
      }
    });
  }

  // Vérifie toutes les 2 min si un digest doit être envoyé
  function startDigestWatcher() {
    if (EMAILJS_SERVICE_ID.includes('REMPLACE')) return;
    checkAndSendDigest();
    setInterval(checkAndSendDigest, 2 * 60 * 1000);
  }

  async function checkAndSendDigest() {
    const nextSnap = await digestRef.child('nextSend').once('value');
    if (!nextSnap.exists()) return;

    const nextSend = nextSnap.val();
    if (Date.now() < nextSend) return;

    // C'est l'heure ! On récupère les messages en attente
    const pendingSnap = await digestRef.child('pending').once('value');
    if (!pendingSnap.exists()) { digestRef.child('nextSend').remove(); return; }

    const msgs = [];
    pendingSnap.forEach(c => msgs.push(c.val()));

    // On nettoie immédiatement pour éviter les doublons si plusieurs onglets
    await digestRef.remove();

    // Construit le résumé texte
    const summary = msgs.map(m =>
      `${m.av} ${m.sender} (${new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}) : ${m.text}`
    ).join('\n');

    const senders = [...new Set(msgs.map(m => m.sender))];

    // Envoie à tous les membres SAUF les expéditeurs actifs
    Object.entries(allMembers).forEach(([name, data]) => {
      if (!data.email || data.email.includes('REMPLACE')) return;
      // Envoie à tout le monde (chacun verra les messages des autres)
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_name:    name,
        to_email:   data.email,
        senders:    senders.join(', '),
        nb_msgs:    msgs.length,
        summary,
        period:     'la dernière heure'
      }).catch(e => console.log('Email err:', e));
    });
  }

  function logout() {
    if(!confirm('Quitter le chat ?')) return;
    location.reload();
  }

  setTimeout(() => document.getElementById('login-name').focus(), 200);
  // Lance le watcher de digest dès le chargement (même avant connexion, pour le cas
  // où quelqu'un a la page ouverte)
  window.addEventListener('load', () => setTimeout(startDigestWatcher, 2000));
</script>
</body>
</html>
